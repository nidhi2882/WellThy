<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breakfast Menu</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
    }
    
    body {
      color: #333;
      background-color: #cde3fa;
      padding-top: 70px; /* To offset fixed navbar */
    }

    header {
      background-image: url('https://wallpaper.forfun.com/fetch/fb/fb9ba40aed17ce2b69c36effc16bda0d.jpeg');
      background-size: cover;
      background-position: center;
      height: 300px;
      position: relative;
    }

    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.6);
    }

    header h1 {
      position: relative;
      color: #fff;
      font-size: 6rem;
      text-align: center;
      top: 50%;
      transform: translateY(-50%);
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      padding: 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card h2 {
      font-size: 1.2rem;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 1rem;
      color: #555;
      margin-bottom: 10px;
    }

    .price {
      font-weight: bold;
      color: #222;
      font-size: 20px;
    }

    .card button {
      background-color: #90ee90;
      border: none;
      padding: 10px 15px;
      margin-top: 10px;
      font-size: 1rem;
      font-weight: bold;
      color: #333;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .card button:hover {
      background-color: #76d976;
    }

    .topnav {
      padding: 10px 20px;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 10;
      background-color: #444;
    }

    .topnav ul {
      list-style: none;
      display: flex;
      justify-content: flex-start;
      font-size: x-large;
    }

    .topnav li {
      margin-right: 20px;
    }

    .topnav a {
      text-decoration: none;
      color: white;
      font-size: 30px;
      padding: 10px 15px;
      display: block;
    }

    .topnav a:hover {
      background-color: #000000;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <ul>
      <li><a href="home.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="contact.html">Contact Us</a></li>
      <li><a href="about.html">About Us</a></li>
    </ul>
  </nav>
