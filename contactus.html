<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - WellThy</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8fa;
            color: #333;
        }

        .header, .footer {
            background-image: url("demo.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgb(233, 207, 8);
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
            opacity: 0.8;
            text-align: center;
            font-size: xx-large;
        }
        .topnav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 10px 20px;
  z-index: 999;
  font-size: x-large;
  font-weight: bold;
  background-color: #000000;
}
        

    .topnav ul {
      list-style: none;
      display: flex;
      justify-content: flex-start;
      font-size: x-large;
    }

    .topnav li {
      margin-right: 20px;
    }

    .topnav a {
      text-decoration: none;
      color: white;
      font-size: 18px;
      padding: 10px 15px;
      display: block;
    }

    .topnav a:hover {
      background-color: #a16767;
      border-radius: 5px;
    }
        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 40px 20px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            width: 320px;
            transition: 0.3s ease-in-out;
        }

        .card:hover {
            transform: translateY(-25px);
            box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.15);
        }

        .card img {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .contact-form {
            background: rgba(255, 255, 255, 0.9);
            max-width: 600px;
            margin: 30px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        .contact-form h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: 500;
            display: block;
            margin: 10px 0 5px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        textarea {
            resize: vertical;
            height: 120px;
        }

        .buttons {
            text-align: center;
        }

        .btn-submit {
            background-color: #ff7eb3;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-submit:hover {
            background-color: #e5679a;
        }

        .footer {
            background-image: url("demo.jpg");
            margin-top: 50px;
            height: 150px;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
            opacity: 0.859;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
            }

            .card, .contact-form {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="topnav">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="aboutus.html">About Us</a></li>
            <li><a class="active" href="contactus.html">Contact Us</a></li>
        </ul>
    </div>

    <div class="header"><p>Reach Out Anytime! 📩<br>
        We’re just a message away!</p></div>

    <div class="container">
        <div class="card">
            <img src="call" alt="Call Icon">
            <h2>Call Us</h2>
            <p>+91-9426533002</p>
        </div>
        <div class="card">
            <img src="email" alt="Email Icon">
            <h2>Email Us</h2>
            <p>info@WellThy.com</p>
        </div>
    </div>

    <div class="contact-form">
        <h1>Get in Touch</h1>
        <form method="post">
            <label for="fname">Your Name*</label>
            <input type="text" id="fname" name="fname" required>

            <label for="contact">Contact Number*</label>
            <input type="tel" id="contact" name="contact" required>

            <label for="mail">Email*</label>
            <input type="email" id="mail" name="mail" required>

            <label for="feedback">Your Message*</label>
            <textarea id="feedback" name="feedback" required></textarea>

            <div class="buttons">
                <button type="submit" class="btn-submit">Submit</button>
            </div>
        </form>
    </div>

    <div class="footer"><h1><b><em>FOLLOW US</em></b></h1></div>
</body>
</html>
